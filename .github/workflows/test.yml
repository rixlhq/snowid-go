name: Test

env:
  GO_VERSION: '1.25'

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 🧰 Checkout code
        uses: actions/checkout@v7

      - name: ⬇️ Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: ⬇️ Download dependencies
        run: go mod download

      - name: ⬇️ Verify dependencies
        run: go mod verify

      - name: 🛠️ Build lib
        run: go build -v ./...

      - name: 🏃 Run tests
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic -coverpkg=./... ./...

      - name: 📊 Check test coverage
        uses: vladopajic/go-test-coverage@v2
        with:
          config: ./.testcoverage.yml

      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.out
          flags: unittests
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: qeeqez/snowid-go

  gostatic:
    runs-on: ubuntu-latest
    steps:
      - name: 🧰 Checkout code
        uses: actions/checkout@v7

      - name: ⬇️ Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: 🏃 Run staticcheck
        uses: dominikh/staticcheck-action@v1.4.1
        with:
          version: "latest"
          install-go: false

  govet:
    runs-on: ubuntu-latest
    steps:
      - name: 🧰 Checkout code
        uses: actions/checkout@v7

      - name: ⬇️ Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: 🏃 Run go vet
        run: go vet ./...

  security:
    runs-on: ubuntu-latest
    steps:
      - name: 🧰 Checkout code
        uses: actions/checkout@v7

      - name: ⬇️ Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: 🏃 Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: 🧰 Checkout code
        uses: actions/checkout@v7

      - name: ⬇️ Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: 🏃 Run linter
        uses: golangci/golangci-lint-action@v9